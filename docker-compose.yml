version: '3.8'

services:
  db:
    image: mysql:latest
    restart: unless-stopped
    container_name: mysql-container1
    ports:
      - "9307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: fadel123
      MYSQL_DATABASE: isp_management
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pfadel123"]
      interval: 5s
      timeout: 5s
      retries: 10

  migration:
    image: migrate/migrate:v4.16.2
    volumes:
      - ./db/migrations:/migrations
    command: -path=/migrations -database "mysql://root:fadel123@tcp(db:3306)/isp_management" up
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: isp-backend
    restart: always
    ports:
      - "9030:3000"
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - DATABASE_NAME=isp_management
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=fadel123
      - WEB_PORT=3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: isp-scheduler
    restart: always
    command: ./scheduler
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - DATABASE_NAME=isp_management
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=fadel123
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: isp-frontend
    restart: always
    ports:
      - "9000:80"
    depends_on:
      - backend

volumes:
  mysql_data: